<section class="fic-hero">
  <div class="fic-hero__media" aria-hidden="true">
    <div class="fic-hero__grid"></div>
  </div>
  <div class="container fic-hero__content">
    <div class="fic-hero__copy">
      <p class="fic-hero__eyebrow">Universidad Autonoma de Tamaulipas</p>
      <h1>Repositorio Institucional FIC</h1>
      <p class="fic-hero__lead">
        Preserva, consulta y difunde la produccion academica, cientifica y tecnologica de la Facultad de Ingenieria y Ciencias.
      </p>
    </div>
    <div class="fic-hero__search">
      <span class="fic-hero__search-label">Buscar en el repositorio</span>
      <ds-themed-search-form [inPlaceSearch]="false" [searchPlaceholder]="'home.search-form.placeholder' | translate"></ds-themed-search-form>
    </div>
  </div>
</section>

<nav class="fic-shortcuts" aria-label="Accesos rapidos">
  <div class="container">
    <a routerLink="/community-list"><span class="fas fa-sitemap" aria-hidden="true"></span>Comunidades</a>
    <a routerLink="/search"><span class="fas fa-flask" aria-hidden="true"></span>Produccion cientifica</a>
    <a routerLink="/browse/title"><span class="fas fa-book-open" aria-hidden="true"></span>Titulos</a>
    <a routerLink="/browse/dateissued"><span class="far fa-calendar-alt" aria-hidden="true"></span>Fecha de publicacion</a>
    <a routerLink="/statistics"><span class="fas fa-chart-line" aria-hidden="true"></span>Estadisticas</a>
  </div>
</nav>
