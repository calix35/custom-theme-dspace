<div class="navbar-nav mr-auto" *ngIf="!(isMobile$ | async); else mobileButtons" data-test="auth-nav">
  <div *ngIf="!(isAuthenticated$ | async)"
       class="nav-item"
       (click)="$event.stopPropagation();">
    <div ngbDropdown #loginDrop="ngbDropdown" display="dynamic" placement="bottom-right" class="d-inline-block"
         container="body"
         @fadeInOut>
      <button class="dropdownLogin btn btn-link px-0" [attr.aria-label]="'nav.login' |translate"
              (click)="$event.preventDefault()" [attr.data-test]="'login-menu' | dsBrowserOnly"
              role="button"
              tabindex="0"
              aria-haspopup="menu"
              aria-controls="loginDropdownMenu"
              [attr.aria-expanded]="loginDrop.isOpen()"
              ngbDropdownToggle>
        {{ 'nav.login' | translate }}
      </button>
      <div id="loginDropdownMenu" [ngClass]="{'pl-3 pr-3': (loading | async)}" ngbDropdownMenu
           role="dialog"
           aria-modal="true"
           [attr.aria-label]="'nav.login' | translate">
        <ds-themed-log-in
          [isStandalonePage]="false"></ds-themed-log-in>
      </div>
    </div>
  </div>
  <div *ngIf="(isAuthenticated$ | async)" class="nav-item" @fadeInOut>
    <div class="d-inline-flex align-items-center mr-2">
      <button class="logoutDesktopBtn" type="button" (click)="doLogout()" data-test="topbar-log-out">
        <i class="fas fa-sign-out-alt mr-1"></i>{{ 'logout.form.submit' | translate }}
      </button>
    </div>
  </div>
</div>
<ng-template #mobileButtons>
  <div data-test="auth-nav" class="d-inline-flex align-items-center">
    <div *ngIf="!(isAuthenticated$ | async)"
         class="nav-item"
         (click)="$event.stopPropagation();">
      <a class="mobileAuthAction btn btn-link px-0"
         [attr.aria-label]="'nav.login' | translate"
         [attr.data-test]="'login-menu-mobile' | dsBrowserOnly"
         [routerLink]="['/login']"
         role="button"
         tabindex="0">
        <i class="fas fa-user-lock fa-lg"></i>
      </a>
    </div>

    <div *ngIf="(isAuthenticated$ | async)" class="nav-item">
      <div class="d-inline-flex align-items-center mr-2">
        <button class="logoutDesktopBtn" type="button" (click)="doLogout()" data-test="topbar-log-out-mobile">
          <i class="fas fa-sign-out-alt mr-1"></i>{{ 'logout.form.submit' | translate }}
        </button>
      </div>
    </div>
  </div>
</ng-template>

<!-- Do not use ul/li in this menu as it breaks e2e accessibility tests -->
