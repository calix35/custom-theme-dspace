<section class="fic-login-page">
  <div class="container">
    <div class="fic-login-wrap">
      <div class="fic-login-brand">
        <p class="fic-login-kicker">{{ 'custom.login.kicker' | translate }}</p>
        <h1>{{ 'login.form.header' | translate }}</h1>
        <p class="fic-login-subtitle">
          {{ 'custom.login.subtitle' | translate }}
        </p>
        <img class="fic-login-logo" src="assets/custom/images/fic-logo.png" [alt]="'custom.login.logo.alt' | translate">
      </div>
      <div class="fic-login-form">
        <ds-themed-log-in [isStandalonePage]="true"></ds-themed-log-in>
      </div>
    </div>
  </div>
</section>
